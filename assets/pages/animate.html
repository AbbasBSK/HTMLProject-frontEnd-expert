<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<style>

  *{
    margin: 0;
    padding: 0;
  }
  body{
    text-align: center;
    background: linear-gradient(to right , rgba(0, 0, 0, 0.8) , rgba(1, 1, 73, 0.8)) , url(../images/بکگراند.jpg);
    background-size: cover;
  }

  .div{
    width: 95vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  img{
    width: 30%;
    animation: dropShadow linear 4s infinite alternate-reverse;
  }


  @keyframes dropShadow {
    0%{filter: drop-shadow(0 0 50px rgba(255, 255, 255 , 0.3)); opacity: 0.5;}
    25%{filter: drop-shadow(0 0 50px rgba(255, 255, 255 , 0.3));  opacity: 1;}
    50%{filter: drop-shadow(0 0 50px rgba(95, 40, 247 , 0.3));  opacity: 1;}
    75%{filter: drop-shadow(0 0 50px rgba(255, 250, 117 , 0.3));  opacity: 1;}
    100%{filter: drop-shadow(0 0 50px rgba(0, 0, 0 , 0.3));opacity: 0.5;} 
  }
</style>
<body>
  <div class="div">
    <img  src="../images/backTranc.png" alt="">
  </div>
</body>
</html>
